<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ads Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #0f172a; color: white; text-align: center; padding: 20px; }
        .btn-green { width: 100%; background: #22c55e; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #errorBox { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #f87171; color: #f87171; margin-top: 20px; display: none; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

    <h1 style="color:#fbbf24;">Diagnostic Mode</h1>
    <p style="color:#94a3b8;">Click the button below to test your connection.</p>
    
    <button class="btn-green" onclick="testConnection()">🔍 Test Firebase Connection</button>
    
    <div id="errorBox"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAIvkzIWM-0giOeJjoiYHv6Sgkb9VC70GE",
            authDomain: "ads-arena-850c5.firebaseapp.com",
            projectId: "ads-arena-850c5",
            storageBucket: "ads-arena-850c5.firebasestorage.app",
            messagingSenderId: "622761057730",
            appId: "1:622761057730:web:39a584220c3b291c768a5b"
        };
        
        function testConnection() {
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'block';
            errorBox.innerHTML = "⏳ Testing connection...";

            try {
                firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();
                
                // Try to read a single document
                db.collection("users").limit(1).get()
                    .then(() => {
                        errorBox.style.borderColor = "#22c55e";
                        errorBox.style.color = "#22c55e";
                        errorBox.innerHTML = "✅ SUCCESS! Your app is connected to Firebase. <br><br>If your Watch Ad button doesn't work, the problem is specifically inside the 'watchAd()' function code, NOT the database connection.";
                    })
                    .catch((error) => {
                        errorBox.innerHTML = "❌ ERROR: " + error.message + "<br><br>Check your Firebase Rules.";
                    });
            } catch (error) {
                errorBox.innerHTML = "❌ CRITICAL ERROR: " + error.message;
            }
        }
    </script>
</body>
</html>
